<!DOCTYPE html>
<html>
<head>
  <title>Admin - Asset Approval</title>
  <style>
    body { font-family: Arial; padding:20px; }
    .apv-badge { padding:4px 8px; border-radius:6px; }
    .green { background:#d4edda; }
    .red { background:#f8d7da; }
    .amber { background:#fff3cd; }
    table { width:100%; border-collapse: collapse; }
    td, th { border:1px solid #ddd; padding:8px; }
    #k-pending { background:#fff3cd; padding:10px; margin-bottom:10px; cursor:pointer; }
  </style>
</head>
<body>

<h2>Admin Portal</h2>

<div id="k-pending">Pending: <span id="pendingCount">0</span> (click to filter)</div>

<select id="approvalFilter" onchange="renderAssets()">
  <option value="all">All</option>
  <option value="pending">Pending</option>
  <option value="approved">Approved</option>
  <option value="rejected">Rejected</option>
</select>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Barcode</th>
      <th>Approval</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="assetTableBody"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabase = supabase.createClient('YOUR_URL','YOUR_KEY');
let assets = [];
const currentUser = { username: 'admin' };

async function fetchAssets(){
  const { data } = await supabase.from('assets').select('*');
  assets = data || [];
  updateKPI();
  renderAssets();
}

function updateKPI(){
  const pending = assets.filter(a => a.approval_status === 'pending').length;
  document.getElementById('pendingCount').innerText = pending;
}

document.getElementById('k-pending').onclick = () => {
  document.getElementById('approvalFilter').value = 'pending';
  renderAssets();
};

function renderAssets(){
  const filter = document.getElementById('approvalFilter').value;
  const tbody = document.getElementById('assetTableBody');
  tbody.innerHTML = '';

  let filtered = assets;
  if(filter !== 'all'){
    filtered = assets.filter(a => a.approval_status === filter);
  }

  filtered.forEach(a => {
    const tr = document.createElement('tr');

    const badge = a.approval_status === 'approved'
      ? '<span class="apv-badge green">Approved</span>'
      : a.approval_status === 'rejected'
      ? `<span class="apv-badge red" title="${a.approval_comment||''}">Rejected</span>`
      : '<span class="apv-badge amber">Pending</span>';

    tr.innerHTML = `
      <td>${a.name}</td>
      <td>${a.barcode}</td>
      <td>${badge}</td>
      <td>
        <button onclick="approveAsset('${a.id}')">Approve</button>
        <button onclick="rejectAsset('${a.id}')">Reject</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

async function approveAsset(id){
  await supabase.from('assets').update({
    approval_status:'approved',
    approved_by: currentUser.username,
    approved_at: new Date().toISOString()
  }).eq('id', id);
  fetchAssets();
}

async function rejectAsset(id){
  const reason = prompt('Enter rejection reason:');
  if(!reason) return;

  await supabase.from('assets').update({
    approval_status:'rejected',
    approval_comment: reason,
    approved_by: currentUser.username,
    approved_at: new Date().toISOString()
  }).eq('id', id);
  fetchAssets();
}

// realtime sync
supabase.channel('assets')
.on('postgres_changes',{event:'*',schema:'public',table:'assets'},()=>fetchAssets())
.subscribe();

fetchAssets();
</script>

</body>
</html>
