<!DOCTYPE html>
<html>
<head>
  <title>Field App</title>
  <style>
    .rejection-notice { background:#f8d7da; padding:10px; margin-bottom:10px; }
    .card { border:1px solid #ddd; padding:10px; margin-bottom:10px; }
  </style>
</head>
<body>

<h2>Field App</h2>

<div id="rejectionBanner" class="rejection-notice" style="display:none"></div>

<div id="history"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabase = supabase.createClient('YOUR_URL','YOUR_KEY');
const currentUser = { id: 'user1' };

async function refreshAssets(){
  const { data } = await supabase
    .from('assets')
    .select('*')
    .eq('registered_by', currentUser.id);

  renderHistory(data || []);
  loadRejectedAssets(data || []);
}

function renderHistory(data){
  const container = document.getElementById('history');
  container.innerHTML = '';

  data.forEach(a=>{
    container.innerHTML += `
      <div class="card">
        <strong>${a.name}</strong> (${a.barcode})<br/>
        Status: ${a.approval_status}<br/>
        ${a.approval_status==='rejected' ? `Reason: ${a.approval_comment}<br/><button onclick="fix('${a.id}')">Fix & Resubmit</button>`:''}
      </div>
    `;
  });
}

function loadRejectedAssets(data){
  const rejected = data.filter(a=>a.approval_status==='rejected');
  const banner = document.getElementById('rejectionBanner');

  if(rejected.length){
    banner.style.display='block';
    banner.innerHTML = rejected.map(a=>`
      <div>
        ${a.name} (${a.barcode}) - ${a.approval_comment}
      </div>
    `).join('');
  } else {
    banner.style.display='none';
  }
}

async function fix(id){
  const { data } = await supabase.from('assets').select('*').eq('id',id).single();
  const newName = prompt('Fix asset name:', data.name);
  if(!newName) return;

  await supabase.from('assets').update({
    name:newName,
    approval_status:'pending',
    approval_comment:null
  }).eq('id',id);

  refreshAssets();
}

// realtime sync
supabase.channel('assets')
.on('postgres_changes',{event:'*',schema:'public',table:'assets'},()=>refreshAssets())
.subscribe();

refreshAssets();
</script>

</body>
</html>
